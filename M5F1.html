<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحة فارغة</title>
<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #001122, #000000 80%);
        font-family: Arial, Helvetica, sans-serif;
    }

    .message {
        color: white;
        font-size: 24px;
        text-align: center;
        padding: 30px;
        border: 2px solid #0088ff;
        border-radius: 20px;
        background: rgba(0,0,0,0.5);
        box-shadow: 0 0 20px #0088ff;
    }
</style>
</head>
<body>

    <div class="message">
        هذه الصفحة لم يتم إضافة محتوى لها بعد
    </div>

</body>
</html>
